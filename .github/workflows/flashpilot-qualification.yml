name: FlashPilot checkpoint qualification

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install development and Hugging Face dependencies
        run: python -m pip install ".[dev,hf]"

      - name: Run Ruff lint
        run: python -m ruff check .

      - name: Check Ruff formatting
        run: python -m ruff format --check .

      - name: Run full test suite
        run: python -m pytest -q

  qualify-checkpoint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install FlashPilot with HF and DeepSpeed qualification support
        run: python -m pip install ".[hf,deepspeed]"

      - name: Run real HF checkpoint qualification
        run: >-
          flashpilot qualify hf-trainer
          --script examples/hf_trainer/train.py
          --profile exact-training-resume
          --fault process-kill
          --scenario complete
          --run-dir runs/ci-hf

      - name: Qualify real two-rank PyTorch FSDP restart
        run: >-
          flashpilot qualify distributed-pytorch
          --strategy fsdp
          --backend gloo
          --world-size 2
          --profile exact-training-resume
          --run-dir runs/ci-distributed

      - name: Qualify FSDP recovery after rank 0 termination
        run: >-
          flashpilot qualify distributed-pytorch
          --strategy fsdp
          --backend gloo
          --world-size 2
          --profile exact-training-resume
          --fault rank-termination
          --target-rank 0
          --run-dir runs/ci-distributed-fault-rank-0

      - name: Qualify FSDP recovery after rank 1 termination
        run: >-
          flashpilot qualify distributed-pytorch
          --strategy fsdp
          --backend gloo
          --world-size 2
          --profile exact-training-resume
          --fault rank-termination
          --target-rank 1
          --run-dir runs/ci-distributed-fault-rank-1

      - name: Qualify real two-rank DeepSpeed ZeRO-2 restart
        run: >-
          flashpilot qualify deepspeed
          --zero-stage 2
          --backend gloo
          --world-size 2
          --profile exact-training-resume
          --run-dir runs/ci-deepspeed

      - name: Qualify DeepSpeed recovery after rank 0 termination
        run: >-
          flashpilot qualify deepspeed
          --zero-stage 2
          --backend gloo
          --world-size 2
          --profile exact-training-resume
          --fault rank-termination
          --target-rank 0
          --run-dir runs/ci-deepspeed-fault-rank-0

      - name: Qualify DeepSpeed recovery after rank 1 termination
        run: >-
          flashpilot qualify deepspeed
          --zero-stage 2
          --backend gloo
          --world-size 2
          --profile exact-training-resume
          --fault rank-termination
          --target-rank 1
          --run-dir runs/ci-deepspeed-fault-rank-1

      - name: Certify managed SIGTERM preemption
        run: >-
          flashpilot certify-preemption
          --framework hf
          --signal SIGTERM
          --grace-period 300
          --script examples/hf_trainer/train.py
          --run-dir runs/ci-preemption

      - name: Audit the qualified checkpoint without executing training
        run: >-
          flashpilot audit-checkpoint
          runs/ci-hf/crash/checkpoints/checkpoint-4
          --profile exact-training-resume
          --output-dir runs/ci-audit

      - name: Enforce the same typed policy and evidence locally used by the CLI
        run: >-
          flashpilot emit-junit
          --run-dir runs/ci-hf
          --policy examples/ci/policy.yml

      - name: Generate an ephemeral qualification signing key
        run: >-
          flashpilot generate-signing-key
          "${RUNNER_TEMP}/flashpilot-signing-key"

      - name: Sign every verified recovery attestation
        shell: bash
        run: |
          private_key="${RUNNER_TEMP}/flashpilot-signing-key/ed25519-private.pem"
          flashpilot sign-attestation runs/ci-hf/recovery.attestation.json --private-key "$private_key"
          flashpilot sign-attestation runs/ci-distributed/recovery.attestation.json --private-key "$private_key"
          flashpilot sign-attestation runs/ci-distributed-fault-rank-0/recovery.attestation.json --private-key "$private_key"
          flashpilot sign-attestation runs/ci-distributed-fault-rank-1/recovery.attestation.json --private-key "$private_key"
          flashpilot sign-attestation runs/ci-deepspeed/recovery.attestation.json --private-key "$private_key"
          flashpilot sign-attestation runs/ci-deepspeed-fault-rank-0/recovery.attestation.json --private-key "$private_key"
          flashpilot sign-attestation runs/ci-deepspeed-fault-rank-1/recovery.attestation.json --private-key "$private_key"
          flashpilot sign-attestation runs/ci-preemption/recovery.attestation.json --private-key "$private_key"
          mkdir -p runs/ci-signing
          cp "${RUNNER_TEMP}/flashpilot-signing-key/ed25519-public.pem" runs/ci-signing/ed25519-public.pem

      - name: Enforce the complete typed qualification-suite policy
        run: >-
          flashpilot enforce-policy
          --policy examples/ci/qualification-policy.yml
          --output-dir runs/ci-policy
          --public-key runs/ci-signing/ed25519-public.pem
          --run hf-process-termination=runs/ci-hf
          --run fsdp-checkpoint-restart=runs/ci-distributed
          --run fsdp-rank-termination-0=runs/ci-distributed-fault-rank-0
          --run fsdp-rank-termination-1=runs/ci-distributed-fault-rank-1
          --run deepspeed-checkpoint-restart=runs/ci-deepspeed
          --run deepspeed-rank-termination-0=runs/ci-deepspeed-fault-rank-0
          --run deepspeed-rank-termination-1=runs/ci-deepspeed-fault-rank-1
          --run hf-managed-preemption=runs/ci-preemption
          --run hf-static-audit=runs/ci-audit

      - name: Enforce the closed organization qualification baseline
        run: >-
          flashpilot enforce-organization-policy
          --organization-policy examples/ci/organization-policy.yml
          --repository-policy examples/ci/qualification-policy.yml
          --scope-id flashpilot-main
          --output-dir runs/ci-organization
          --public-key runs/ci-signing/ed25519-public.pem
          --run hf-process-termination=runs/ci-hf
          --run fsdp-checkpoint-restart=runs/ci-distributed
          --run fsdp-rank-termination-0=runs/ci-distributed-fault-rank-0
          --run fsdp-rank-termination-1=runs/ci-distributed-fault-rank-1
          --run deepspeed-checkpoint-restart=runs/ci-deepspeed
          --run deepspeed-rank-termination-0=runs/ci-deepspeed-fault-rank-0
          --run deepspeed-rank-termination-1=runs/ci-deepspeed-fault-rank-1
          --run hf-managed-preemption=runs/ci-preemption
          --run hf-static-audit=runs/ci-audit

      - name: Attest the terminal organization policy with GitHub OIDC provenance
        if: success()
        id: oidc-provenance
        uses: actions/attest@v4
        with:
          subject-path: runs/ci-organization/organization-policy-evaluation.json

      - name: Verify the GitHub OIDC provenance bundle
        shell: bash
        run: |
          mkdir -p runs/ci-provenance
          cp "${{ steps.oidc-provenance.outputs.bundle-path }}" \
            runs/ci-provenance/github-oidc-provenance.sigstore.json
          gh attestation verify runs/ci-organization/organization-policy-evaluation.json \
            --bundle runs/ci-provenance/github-oidc-provenance.sigstore.json \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/flashpilot-qualification.yml" \
            --signer-digest "${GITHUB_WORKFLOW_SHA}" \
            --source-digest "${GITHUB_SHA}" \
            --source-ref "${GITHUB_REF}" \
            --predicate-type "https://slsa.dev/provenance/v1" \
            --cert-oidc-issuer "https://token.actions.githubusercontent.com" \
            --deny-self-hosted-runners \
            --format json \
            > runs/ci-provenance/verification.json

      - name: Remove the ephemeral signing private key
        if: always()
        shell: bash
        run: rm -f -- "${RUNNER_TEMP}/flashpilot-signing-key/ed25519-private.pem"

      - name: Publish FlashPilot Markdown job summary
        if: always()
        shell: bash
        run: |
          for summary in runs/ci-*/job-summary.md; do
            if [[ -f "$summary" ]]; then
              cat "$summary" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Upload diagnostic reports, JUnit, and SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flashpilot-ci-evidence
          if-no-files-found: error
          path: |
            examples/ci/organization-policy.yml
            examples/ci/qualification-policy.yml
            schemas/attestation-signature-v1.schema.json
            schemas/organization-qualification-policy-v1.schema.json
            schemas/organization-policy-evaluation-v1.schema.json
            schemas/qualification-policy-v1.schema.json
            schemas/qualification-policy-evaluation-v1.schema.json
            runs/**/junit.xml
            runs/**/job-summary.md
            runs/**/report.md
            runs/**/result.json
            runs/**/audit.json
            runs/**/organization-policy-evaluation.json
            runs/**/policy-evaluation.json
            runs/**/failure-event.json
            runs/**/phases/fault/*.json
            runs/**/preemption/commit.json
            runs/**/results.sarif

      - name: Upload verified recovery attestations and provenance
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flashpilot-attestation
          if-no-files-found: error
          path: |
            runs/**/recovery.attestation.json
            runs/**/recovery.attestation.signature.json
            runs/ci-signing/ed25519-public.pem
            examples/ci/organization-policy.yml
            examples/ci/qualification-policy.yml
            runs/ci-organization/organization-policy-evaluation.json
            runs/ci-organization/repository-policy/policy-evaluation.json
            runs/ci-policy/policy-evaluation.json
            runs/ci-provenance/github-oidc-provenance.sigstore.json
            runs/ci-provenance/verification.json
